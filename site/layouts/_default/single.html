{{ define "main" }}
<article class="post">
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    <div class="post-meta">
      <time>{{ .Date.Format "02 January 2006" }}</time>
      {{ with .Params.rating }}
      <span class="rating">Rating: {{ . }}/10</span>
      {{ end }}
    </div>
  </header>

  {{ with .Params.affiliate_link }}
  <div class="affiliate-cta">
    <a href="{{ . }}" target="_blank" rel="nofollow sponsored" class="btn-cta">
      Get the Best Price
    </a>
  </div>
  {{ end }}

  <div class="post-content">
    {{ .Content }}
  </div>

  {{ with .Params.affiliate_link }}
  <div class="affiliate-cta affiliate-cta--bottom">
    <a href="{{ . }}" target="_blank" rel="nofollow sponsored" class="btn-cta">
      Check It Out &amp; Buy Now
    </a>
  </div>
  {{ end }}
</article>
{{ end }}
