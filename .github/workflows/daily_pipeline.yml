name: Daily Marketing Pipeline

on:
  schedule:
    - cron: '0 6 * * *'    # 06:00 UTC — morning research
    - cron: '0 10 * * *'   # 10:00 UTC — midday generate
    - cron: '0 16 * * *'   # 16:00 UTC — evening social
    - cron: '0 8 * * 1'    # 08:00 UTC Monday — weekly analysis
  workflow_dispatch:
    inputs:
      stage:
        description: 'Stage to run (full = all stages)'
        required: false
        default: 'full'
        type: choice
        options: [full, morning, midday, evening, weekly]

# Prevent two pipeline runs from overlapping.
concurrency:
  group: daily-pipeline
  cancel-in-progress: false

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.12'

# ---------------------------------------------------------------------------
# Each job has a per-job `if` that gates on schedule cron OR dispatch stage.
# No inter-job `needs` — avoids the GitHub Actions bug where a skipped
# dependency silently skips all downstream jobs even with `always()`.
# Staggered cron times provide natural ordering for the scheduled case.
# ---------------------------------------------------------------------------

jobs:
  morning-research:
    name: Morning — Product Research
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 6 * * *') ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.stage == 'full' || github.event.inputs.stage == 'morning'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - name: Research trending products
        run: python scripts/pipeline/morning_research.py
        env:
          GROQ_API_KEY:             ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN:             ${{ secrets.GITHUB_TOKEN }}
          AMAZON_ACCESS_KEY:        ${{ secrets.AMAZON_ACCESS_KEY }}
          AMAZON_SECRET_KEY:        ${{ secrets.AMAZON_SECRET_KEY }}
          AMAZON_ASSOCIATE_TAG:     ${{ secrets.AMAZON_ASSOCIATE_TAG }}
          CLICKBANK_DEV_API_KEY:    ${{ secrets.CLICKBANK_DEV_API_KEY }}
          CLICKBANK_CLERK_API_KEY:  ${{ secrets.CLICKBANK_CLERK_API_KEY }}
          CJ_API_TOKEN:             ${{ secrets.CJ_API_TOKEN }}
          CJ_WEBSITE_ID:            ${{ secrets.CJ_WEBSITE_ID }}
          SHAREASALE_API_TOKEN:     ${{ secrets.SHAREASALE_API_TOKEN }}
          SHAREASALE_API_SECRET:    ${{ secrets.SHAREASALE_API_SECRET }}
          SHAREASALE_AFFILIATE_ID:  ${{ secrets.SHAREASALE_AFFILIATE_ID }}
          SITE_BASE_URL:            ${{ secrets.SITE_BASE_URL }}

  midday-generate:
    name: Midday — Content Generation
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 10 * * *') ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.stage == 'full' || github.event.inputs.stage == 'midday'))
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - name: Generate articles and push to site
        run: python scripts/pipeline/midday_generate.py
        env:
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
          AMAZON_ASSOCIATE_TAG: ${{ secrets.AMAZON_ASSOCIATE_TAG }}
          SITE_BASE_URL:        ${{ secrets.SITE_BASE_URL }}

  evening-social:
    name: Evening — Social Media
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 16 * * *') ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.stage == 'full' || github.event.inputs.stage == 'evening'))
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - name: Post to social media and track metrics
        run: python scripts/pipeline/evening_social.py
        env:
          GITHUB_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
          TWITTER_API_KEY:          ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:       ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:     ${{ secrets.TWITTER_ACCESS_TOKEN }}
          # Map both naming conventions — config.py reads whichever is set
          TWITTER_ACCESS_SECRET:    ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          TWITTER_BEARER_TOKEN:     ${{ secrets.TWITTER_BEARER_TOKEN }}
          REDDIT_CLIENT_ID:        ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET:    ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME:         ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD:         ${{ secrets.REDDIT_PASSWORD }}
          PINTEREST_ACCESS_TOKEN:  ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_AD_ACCOUNT_ID: ${{ secrets.PINTEREST_AD_ACCOUNT_ID }}
          SITE_BASE_URL:           ${{ secrets.SITE_BASE_URL }}

  weekly-analysis:
    name: Weekly — Performance Analysis
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 8 * * 1') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.stage == 'weekly')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run weekly analysis
        run: python scripts/pipeline/weekly_analyze.py
        env:
          GITHUB_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
          TWITTER_BEARER_TOKEN:    ${{ secrets.TWITTER_BEARER_TOKEN }}
          REDDIT_CLIENT_ID:        ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET:    ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME:         ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD:         ${{ secrets.REDDIT_PASSWORD }}
          PINTEREST_ACCESS_TOKEN:  ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_AD_ACCOUNT_ID: ${{ secrets.PINTEREST_AD_ACCOUNT_ID }}
          SITE_BASE_URL:           ${{ secrets.SITE_BASE_URL }}
